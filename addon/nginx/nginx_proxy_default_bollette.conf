# Bollette/ConsumiCasa — API del backend sotto lo stesso dominio HTTPS del proxy.
# Snippet per l'add-on "NGINX Home Assistant SSL proxy" in modalita' customize:
# va copiato in /share (pattern di default: nginx_proxy_default*.conf) e viene
# incluso nel blocco server{} del vhost HTTPS. Dopo la copia: riavviare l'add-on NGINX.
#
# Effetto: https://<dominio>/bollette-api/...  ->  http://192.168.1.15:8000/...
# (il prefisso viene rimosso: il backend vede /api/..., /database/pdfs/..., ecc.)
# Cosi' l'app servita via proxy (/local/Bollette/) chiama l'API SAME-ORIGIN:
# niente mixed content, funziona anche da fuori casa.
location /bollette-api/ {
    proxy_pass http://192.168.1.15:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 64m;      # upload PDF bollette (anche scansioni pesanti)
    proxy_read_timeout 180s;       # estrazione Gemini ~20-30 s: margine largo
}
