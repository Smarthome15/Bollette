# Add-on locale Home Assistant: backend Python dell'app Bollette/ConsumiCasa.
# Vive in /addons/bollette_backend sul Raspberry (consegna: addon/deploy_addon.ps1).
# Il CODICE dell'app NON è dentro l'add-on: gira da /homeassistant/www/bollette
# (la stessa cartella pubblicata con "Pubblica su NAS"), così pubblicare +
# riavviare l'add-on = deploy. Vincoli concordati con Jarvis (11/07/2026):
# boot auto + watchdog, chiave Gemini nelle options, log sobri.
name: "Bollette Backend (ConsumiCasa)"
version: "1.0.2"
slug: "bollette_backend"
description: "Backend Python dell'app Bollette/ConsumiCasa: API, salvataggio JSON, estrazione bollette PDF via Gemini."
url: "https://github.com/Smarthome15/Bollette"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
watchdog: "tcp://[HOST]:[PORT:8000]"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "API + interfaccia web ConsumiCasa"
map:
  - type: homeassistant_config
    read_only: false
options:
  gemini_api_key: ""
schema:
  gemini_api_key: "password?"
